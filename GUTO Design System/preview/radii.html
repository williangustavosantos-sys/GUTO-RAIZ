<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radii</title>
<style>
  .card { gap: 22px; padding: 22px; }
  .stage { display: flex; gap: 22px; align-items: center; width: 100%; justify-content: space-around; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 78px; height: 78px; background: rgba(255,255,255,0.82); border: 1px solid var(--card-border); box-shadow: var(--guto-deboss); }
  .lbl { font: 900 9px/1 var(--guto-font-tech); letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg2); }
  .v { font: 600 10px/1 var(--guto-font-tech); color: var(--fg1); }
  .pill { width: 110px; height: 44px; background:#52e7ff; border-radius: 999px; display:grid; place-items:center; font: 900 10px/1 var(--guto-font-tech); letter-spacing: 0.18em; color: #0d2341; box-shadow: 0 4px 20px rgba(82,231,255,0.30); }
</style>
</head><body>
<div class="card"><div class="stage">
  <div class="demo"><div class="box" style="border-radius:6px"></div><div class="lbl">XS</div><div class="v">6px</div></div>
  <div class="demo"><div class="box" style="border-radius:10px"></div><div class="lbl">SM</div><div class="v">10px</div></div>
  <div class="demo"><div class="box" style="border-radius:14px"></div><div class="lbl">MD</div><div class="v">14px</div></div>
  <div class="demo"><div class="box" style="border-radius:16px; outline: 2px solid rgba(82,231,255,0.5); outline-offset: 4px;"></div><div class="lbl">LG · default</div><div class="v">16px</div></div>
  <div class="demo"><div class="box" style="border-radius:22px"></div><div class="lbl">XL</div><div class="v">22px</div></div>
  <div class="demo"><div class="pill">PILL · CTA</div><div class="lbl">PILL</div><div class="v">999px</div></div>
</div></div>
</body></html>
