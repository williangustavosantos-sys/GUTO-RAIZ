<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Voice</title>
<style>
  .card { padding: 22px 26px; flex-direction: column; gap: 10px; align-items: stretch; }
  .row {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 14px;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dashed rgba(13,35,65,0.10);
  }
  .row:last-child { border-bottom: none; }
  .who { font: 900 9px/1.2 var(--guto-font-tech); letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg3); }
  .who.guto { color: #52e7ff; text-shadow: 0 0 8px rgba(82,231,255,0.5); }
  .quote { font: 500 13px/1.45 var(--guto-font-tech); color: var(--fg1); }
  .quote em { font-style: italic; color: var(--fg2); font-weight: 400; }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="who guto">GUTO</div><div class="quote">Estamos prontos. Sem distrações.</div></div>
  <div class="row"><div class="who guto">GUTO</div><div class="quote">Antes de eu te puxar, preciso entender o teu corpo.</div></div>
  <div class="row"><div class="who guto">GUTO</div><div class="quote">Execução controlada. Nada de pressa.</div></div>
  <div class="row"><div class="who guto">GUTO</div><div class="quote">Você já é mais forte do que ontem. O melhor ainda está por vir.</div></div>
  <div class="row"><div class="who" style="color:#9d2b2b">never</div><div class="quote"><em>"Hey there! 👋 Let's crush this together! 🔥"</em></div></div>
</div>
</body></html>
