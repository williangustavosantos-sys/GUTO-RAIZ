<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Text alphas</title>
<style>
  .card { padding: 22px 26px; align-items: stretch; }
  .stage { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .row {
    display: grid;
    grid-template-columns: 80px 1fr 130px 100px;
    gap: 16px;
    align-items: center;
    padding: 7px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--card-border);
  }
  .chip { width: 60px; height: 22px; border-radius: 6px; }
  .label { font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }
  .sample { font-size: 13px; font-weight: 600; }
  .var { font-family: var(--guto-font-tech); font-size: 10px; opacity: 0.7; letter-spacing: 0.04em; }
  .alpha { font-size: 10px; opacity: 0.6; text-align: right; font-weight: 600; }
</style>
</head><body>
<div class="card"><div class="stage">
  <div class="row">
    <div class="chip" style="background:#0d2341;"></div>
    <div><span class="label" style="color:#0d2341">FG1</span> &nbsp; <span class="sample" style="color:#0d2341">Estamos prontos. Sem distrações.</span></div>
    <div class="var">--fg1</div>
    <div class="alpha">navy / 1.0</div>
  </div>
  <div class="row">
    <div class="chip" style="background:rgba(13,35,65,0.68);"></div>
    <div><span class="label" style="color:rgba(13,35,65,0.68)">FG2</span> &nbsp; <span class="sample" style="color:rgba(13,35,65,0.68)">Antes de eu te puxar, preciso entender o teu corpo.</span></div>
    <div class="var">--fg2</div>
    <div class="alpha">navy / 0.68</div>
  </div>
  <div class="row">
    <div class="chip" style="background:rgba(13,35,65,0.48);"></div>
    <div><span class="label" style="color:rgba(13,35,65,0.48)">FG3</span> &nbsp; <span class="sample" style="color:rgba(13,35,65,0.48)">Precisa de convite? Fale com seu coach.</span></div>
    <div class="var">--fg3</div>
    <div class="alpha">navy / 0.48</div>
  </div>
  <div class="row">
    <div class="chip" style="background:rgba(13,35,65,0.20);"></div>
    <div><span class="label" style="color:rgba(13,35,65,0.20)">FG-MUTE</span> &nbsp; <span class="sample" style="color:rgba(13,35,65,0.20)">IDENTIDADE</span></div>
    <div class="var">--fg-mute</div>
    <div class="alpha">navy / 0.20</div>
  </div>
</div></div>
</body></html>
