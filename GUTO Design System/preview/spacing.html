<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing</title>
<style>
  .card { padding: 22px 26px; flex-direction: column; gap: 8px; align-items: stretch; }
  .row { display: grid; grid-template-columns: 50px 1fr 70px; gap: 14px; align-items: center; padding: 4px 0; }
  .name { font: 900 10px/1 var(--guto-font-tech); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg2); }
  .bar { background: linear-gradient(90deg, #52e7ff 0%, rgba(82,231,255,0.4) 100%); height: 12px; border-radius: 4px; box-shadow: inset 0 0 0 1px rgba(13,35,65,0.08); }
  .px { font: 600 10px/1 var(--guto-font-tech); color: var(--fg1); text-align: right; }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="name">1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="name">2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="name">3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="name">4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="name">6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="name">8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="name">12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="name">16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</div>
</body></html>
