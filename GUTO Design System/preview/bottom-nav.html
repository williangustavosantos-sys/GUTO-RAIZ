<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Bottom nav</title>
<style>
  .card { padding: 22px 26px; flex-direction: column; gap: 12px; align-items: stretch; }
  .nav {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(5px);
    border-radius: 22px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    border: 1px solid rgba(193,204,218,0.5);
  }
  .tile {
    height: 64px;
    border-radius: 16px;
    background: rgba(255,255,255,0.6);
    box-shadow: inset 2px 2px 8px rgba(152,163,179,0.22), inset -6px -6px 12px rgba(255,255,255,0.94);
    display: grid; place-items: center;
    color: rgba(13,35,65,0.56);
    position: relative;
    overflow: hidden;
  }
  .tile.active {
    background: radial-gradient(circle, rgba(82,231,255,0.20) 0%, rgba(255,255,255,0) 62%), rgba(255,255,255,0.6);
    color: #52e7ff;
  }
  .tile svg { width: 22px; height: 22px; stroke-width: 2.4; }
  .lbl { font: 900 9px/1 var(--guto-font-tech); letter-spacing: 0.30em; text-transform: uppercase; color: var(--fg3); text-align: center; }
</style>
</head><body>
<div class="card">
  <div class="nav">
    <div class="tile active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(82,231,255,0.86)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(82,231,255,0.86)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(82,231,255,0.86)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(82,231,255,0.86)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(82,231,255,0.86)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 6px;">
    <div class="lbl">GUTO</div><div class="lbl">TREINO</div><div class="lbl">DIETA</div><div class="lbl">ARENA</div><div class="lbl">EVO.</div><div class="lbl">PERC.</div>
  </div>
</div>
</body></html>
