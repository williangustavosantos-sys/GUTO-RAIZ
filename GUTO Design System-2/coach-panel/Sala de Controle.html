<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GUTO · Sala de Controle</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden;
    background:
      radial-gradient(80% 60% at 0% 0%, rgba(82,231,255,0.05) 0%, transparent 60%),
      radial-gradient(60% 50% at 100% 100%, rgba(82,231,255,0.04) 0%, transparent 60%),
      #04060f;
  }
  body { font-family: "JetBrains Mono", "SF Mono", Menlo, Monaco, Consolas, monospace; color: #e8f4ff; }

  ::-webkit-scrollbar       { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(82,231,255,0.18); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(82,231,255,0.35); }

  button { font-family: inherit; }
  input, select { font-family: inherit; outline: none; }
  select option { background: #0d1426; color: #e8f4ff; }

  input::placeholder { color: rgba(232,244,255,0.25); }
  input:focus, select:focus { border-color: rgba(82,231,255,0.40) !important;
    box-shadow: 0 0 0 1px rgba(82,231,255,0.20) !important; }

  button:hover { filter: brightness(1.12); }
  button:active { transform: scale(0.97); }

  /* Subtle scanline overlay so the room reads as "control room" */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(0deg,
      rgba(82,231,255,0.018) 0px,
      rgba(82,231,255,0.018) 1px,
      transparent 1px, transparent 3px);
    mix-blend-mode: screen;
  }
  #root { position: relative; z-index: 2; height: 100vh; }

  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn   {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
  integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
  integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
  integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
  crossorigin="anonymous"></script>

<script type="text/babel">
  window.PanelCtx = React.createContext(null);
</script>

<!-- Existing data + student drawer reused; new shell + screens + empresa drawer added -->
<script type="text/babel" src="panel-data.jsx"></script>
<script type="text/babel" src="sala-data.jsx"></script>
<script type="text/babel" src="sala-shell.jsx"></script>
<script type="text/babel" src="sala-screens.jsx"></script>
<script type="text/babel" src="sala-empresa.jsx"></script>
<script type="text/babel" src="panel-student.jsx"></script>

<script type="text/babel">
const { useState: useApp, useCallback: useCb, useEffect: useEf } = React;

function App() {
  const [activeScreen,    setActiveScreen]    = useApp("hoje");
  const [collapsed,       setCollapsed]       = useApp(false);
  const [selectedStudent, setSelectedStudent] = useApp(null);
  const [detailTab,       setDetailTab]       = useApp("resumo");
  const [empresa,         setEmpresa]         = useApp(null);
  const [showCreate,      setShowCreate]      = useApp(null);

  const openStudent  = useCb((s, tab="resumo") => { setSelectedStudent(s); setDetailTab(tab); }, []);
  const closeStudent = useCb(() => setSelectedStudent(null), []);
  const openEmpresa  = useCb((e) => setEmpresa(e), []);
  const closeEmpresa = useCb(() => setEmpresa(null), []);

  // Esc to close overlays (most-recent first)
  useEf(() => {
    const onKey = (ev) => {
      if (ev.key !== "Escape") return;
      if (showCreate)      setShowCreate(null);
      else if (selectedStudent) closeStudent();
      else if (empresa)         closeEmpresa();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [showCreate, selectedStudent, empresa, closeStudent, closeEmpresa]);

  const ctx = {
    activeScreen, setActiveScreen,
    selectedStudent, openStudent, closeStudent,
    detailTab, setDetailTab,
    empresa, openEmpresa, closeEmpresa,
    showCreate, setShowCreate,
  };

  return (
    <window.PanelCtx.Provider value={ctx}>
      <div style={{ display:"flex", height:"100vh", overflow:"hidden" }}>
        <Sidebar collapsed={collapsed} onToggle={() => setCollapsed(v => !v)}/>
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>
          <Header/>
          <main style={{ flex:1, overflowY:"auto" }}>
            <ActiveScreen/>
          </main>
        </div>

        {selectedStudent && <StudentPanel/>}
        {empresa          && <EmpresaDrawer/>}
        {showCreate       && <CreateModal/>}
      </div>
    </window.PanelCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
