<!doctype html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="_base.css"/></head><body class="dark"><div class="card">
<div style="display:flex;flex-direction:column;gap:8px;">
  <div style="display:flex;gap:8px;align-items:stretch;">
    <div style="width:140px;height:84px;border-radius:14px;background:#52e7ff;
      box-shadow: 0 0 34px rgba(82,231,255,0.58);
      display:flex;align-items:flex-end;padding:10px;color:#04131e;font-weight:900;font-size:10px;letter-spacing:0.18em;">CYAN</div>
    <div style="flex:1;display:grid;grid-template-rows:repeat(3,1fr);gap:6px;">
      <div class="sw" style="background:rgba(82,231,255,0.14);color:#52e7ff;border:1px solid rgba(82,231,255,0.24);">
        <span class="name">Cyan · Soft</span><span class="hex">cyan / 14</span></div>
      <div class="sw" style="background:transparent;color:#52e7ff;border:1px solid rgba(82,231,255,0.24);">
        <span class="name">Cyan · Line</span><span class="hex">cyan / 24</span></div>
      <div class="sw" style="background:linear-gradient(135deg,#7df0ff,#1ec5e0);color:#04131e;
        box-shadow:0 0 18px rgba(82,231,255,0.28);">
        <span class="name">Cyan · CTA Gradient</span><span class="hex">→ #1ec5e0</span></div>
    </div>
  </div>
</div></div></body></html>
